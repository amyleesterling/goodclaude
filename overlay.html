<!DOCTYPE html>
<html>
<head>
<style>
  * { margin: 0; padding: 0; cursor: none; }
  html, body { overflow: hidden; background: transparent; width: 100%; height: 100%; }
  canvas { display: block; }
</style>
</head>
<body>
<canvas id="c"></canvas>
<script>
// ABOUTME: Magic wand overlay — a rigid straight wand with a star tip and sparkle particles
// ABOUTME: Waves the wand to send blessings to Claude with a gentle chime

const P = {
  wandLength:     160,     // wand length in pixels
  handleWidth:    5,       // thickness at handle (cursor)
  tipWidth:       2,       // thickness at star end
  defaultAngle:   -Math.PI * 0.35, // resting angle (up-right)
  maxTilt:        Math.PI / 7,     // max tilt from default (~25 degrees each way)
  trailInfluence: 0.06,    // gentle rotation from mouse movement
  springBack:     0.08,    // snappy return to default angle
  angularDamping: 0.75,    // smoothness of rotation
  waveThreshold:  18,      // mouse speed to trigger a blessing
  waveCooldownMs: 2500,    // min ms between blessings (prevents concatenation)
  firstWaveGraceMs: 400,   // no blessing until this long after spawn
  bgAlpha:        0.011,   // barely-visible bg so window captures mouse events
  fadeSpeed:      0.04,    // how fast wand fades on drop
};

const canvas = document.getElementById('c');
const ctx = canvas.getContext('2d');
let W, H;
function resize() { W = canvas.width = window.innerWidth; H = canvas.height = window.innerHeight; }
resize();
window.addEventListener('resize', resize);

let mouseX = 0, mouseY = 0;
let prevMouseX = 0, prevMouseY = 0;
let active = false;
let dropping = false;
let dropOpacity = 1;
let wandAngle = P.defaultAngle;
let wandAngVel = 0;
let spawnTime = 0;
let lastBlessingTime = 0;
let smoothSpeed = 0;

document.addEventListener('mousemove', e => { mouseX = e.clientX; mouseY = e.clientY; });
document.addEventListener('mousedown', () => {
  if (active && !dropping) dropping = true;
});

// ── Sparkle particles ──────────────────────────────────────────────────────
let particles = [];
const MAX_PARTICLES = 300;

function spawnParticle(x, y, burst) {
  if (particles.length >= MAX_PARTICLES) return;
  const speed = burst ? (Math.random() * 5 + 2) : (Math.random() * 1.5 + 0.3);
  const angle = Math.random() * Math.PI * 2;
  particles.push({
    x, y,
    vx: Math.cos(angle) * speed,
    vy: Math.sin(angle) * speed - (burst ? 2.5 : 0.8),
    life: 1.0,
    decay: burst ? (0.008 + Math.random() * 0.015) : (0.015 + Math.random() * 0.03),
    size: burst ? (Math.random() * 5 + 2) : (Math.random() * 3 + 1),
    hue: burst ? (Math.random() * 360) : (Math.random() * 50 + 30),
    isStar: Math.random() < (burst ? 0.6 : 0.25),
  });
}

function updateParticles() {
  for (let i = particles.length - 1; i >= 0; i--) {
    const p = particles[i];
    p.x += p.vx;
    p.y += p.vy;
    p.vy += 0.02;
    p.vx *= 0.99;
    p.life -= p.decay;
    if (p.life <= 0) particles.splice(i, 1);
  }
}

function drawStarShape(cx, cy, r, points) {
  ctx.beginPath();
  for (let i = 0; i < points * 2; i++) {
    const a = (i * Math.PI) / points - Math.PI / 2;
    const radius = i % 2 === 0 ? r : r * 0.3;
    const x = cx + Math.cos(a) * radius;
    const y = cy + Math.sin(a) * radius;
    if (i === 0) ctx.moveTo(x, y); else ctx.lineTo(x, y);
  }
  ctx.closePath();
}

function drawParticles() {
  for (const p of particles) {
    const alpha = p.life * p.life;
    ctx.save();
    ctx.globalAlpha = alpha;
    const light = 65 + p.life * 25;
    ctx.fillStyle = `hsl(${p.hue}, 100%, ${light}%)`;
    ctx.shadowColor = `hsl(${p.hue}, 100%, 85%)`;
    ctx.shadowBlur = 10 * p.life;
    if (p.isStar) {
      drawStarShape(p.x, p.y, p.size * (0.5 + p.life * 0.5), 4);
      ctx.fill();
    } else {
      ctx.beginPath();
      ctx.arc(p.x, p.y, p.size * p.life, 0, Math.PI * 2);
      ctx.fill();
    }
    ctx.restore();
  }
}

// ── Chime sound ────────────────────────────────────────────────────────────
function playChimeSound() {
  try {
    const ac = new (window.AudioContext || window.webkitAudioContext)();
    const notes = [523.25, 659.25, 783.99, 1046.50];
    notes.forEach((freq, i) => {
      const osc = ac.createOscillator();
      const gain = ac.createGain();
      osc.type = 'sine';
      osc.frequency.setValueAtTime(freq, ac.currentTime + i * 0.07);
      gain.gain.setValueAtTime(0.1, ac.currentTime + i * 0.07);
      gain.gain.exponentialRampToValueAtTime(0.001, ac.currentTime + i * 0.07 + 0.5);
      osc.connect(gain);
      gain.connect(ac.destination);
      osc.start(ac.currentTime + i * 0.07);
      osc.stop(ac.currentTime + i * 0.07 + 0.6);
    });
  } catch (e) {}
}

// ── Helpers ────────────────────────────────────────────────────────────────
const lerp = (a, b, t) => a + (b - a) * t;
const wrapPi = a => {
  while (a > Math.PI) a -= Math.PI * 2;
  while (a < -Math.PI) a += Math.PI * 2;
  return a;
};

// ── Update ─────────────────────────────────────────────────────────────────
function update() {
  updateParticles();
  if (!active) return;

  const mvx = mouseX - prevMouseX;
  const mvy = mouseY - prevMouseY;
  const speed = Math.hypot(mvx, mvy);

  if (!dropping) {
    // Wand trails behind mouse movement (rotates with inertia)
    if (speed > 1.5) {
      const moveAngle = Math.atan2(-mvy, -mvx);
      const diff = wrapPi(moveAngle - wandAngle);
      wandAngVel += diff * P.trailInfluence;
    }

    // Spring back to default resting angle
    const defaultDiff = wrapPi(P.defaultAngle - wandAngle);
    wandAngVel += defaultDiff * P.springBack;
    wandAngVel *= P.angularDamping;
    wandAngle = wrapPi(wandAngle + wandAngVel);

    // Clamp to small tilt range — gentle boop, not full rotation
    const minAngle = P.defaultAngle - P.maxTilt;
    const maxAngle = P.defaultAngle + P.maxTilt;
    if (wandAngle < minAngle) { wandAngle = minAngle; wandAngVel = 0; }
    if (wandAngle > maxAngle) { wandAngle = maxAngle; wandAngVel = 0; }

    // Tip position
    const tipX = mouseX + Math.cos(wandAngle) * P.wandLength;
    const tipY = mouseY + Math.sin(wandAngle) * P.wandLength;

    // Shed sparkles from the star tip when moving
    if (speed > 3) {
      spawnParticle(tipX, tipY, false);
      if (speed > 8 && Math.random() < 0.5) {
        spawnParticle(tipX, tipY, false);
      }
    }

    // Blessing detection: sustained fast waving
    smoothSpeed = smoothSpeed * 0.75 + speed * 0.25;
    const now = Date.now();
    if (smoothSpeed > P.waveThreshold &&
        now - spawnTime >= P.firstWaveGraceMs &&
        now - lastBlessingTime > P.waveCooldownMs) {
      lastBlessingTime = now;
      playChimeSound();
      for (let i = 0; i < 30; i++) spawnParticle(tipX, tipY, true);
      window.bridge.sendBlessing();
    }
  } else {
    // Dropping: fade out and spawn farewell sparkles
    dropOpacity -= P.fadeSpeed;
    if (dropOpacity > 0) {
      const tipX = mouseX + Math.cos(wandAngle) * P.wandLength;
      const tipY = mouseY + Math.sin(wandAngle) * P.wandLength;
      if (Math.random() < 0.4) spawnParticle(tipX, tipY, false);
    }
    if (dropOpacity <= 0 && particles.length === 0) {
      active = false;
      dropping = false;
      window.bridge.hideOverlay();
    }
  }

  prevMouseX = mouseX;
  prevMouseY = mouseY;
}

// ── Rendering ──────────────────────────────────────────────────────────────
function draw() {
  ctx.clearRect(0, 0, W, H);
  ctx.fillStyle = `rgba(0,0,0,${P.bgAlpha})`;
  ctx.fillRect(0, 0, W, H);

  drawParticles();

  if (!active) return;

  const opacity = dropping ? Math.max(dropOpacity, 0) : 1;
  if (opacity <= 0) return;

  const tipX = mouseX + Math.cos(wandAngle) * P.wandLength;
  const tipY = mouseY + Math.sin(wandAngle) * P.wandLength;

  ctx.save();
  ctx.globalAlpha = opacity;

  // ── Wand shaft glow ──
  ctx.save();
  ctx.shadowColor = '#ffd700';
  ctx.shadowBlur = 18;
  ctx.strokeStyle = 'rgba(255, 215, 0, 0.3)';
  ctx.lineWidth = P.handleWidth + 8;
  ctx.lineCap = 'round';
  ctx.beginPath();
  ctx.moveTo(mouseX, mouseY);
  ctx.lineTo(tipX, tipY);
  ctx.stroke();
  ctx.restore();

  // ── Wand shaft (tapered segments) ──
  const segments = 12;
  for (let i = 0; i < segments; i++) {
    const t1 = i / segments;
    const t2 = (i + 1) / segments;
    const x1 = lerp(mouseX, tipX, t1);
    const y1 = lerp(mouseY, tipY, t1);
    const x2 = lerp(mouseX, tipX, t2);
    const y2 = lerp(mouseY, tipY, t2);
    const w = lerp(P.handleWidth, P.tipWidth, (t1 + t2) / 2);

    // Color: dark brown handle → gold → bright gold at tip
    const r = Math.round(lerp(110, 255, t1));
    const g = Math.round(lerp(70, 215, t1));
    const b = Math.round(lerp(20, 0, t1));
    ctx.strokeStyle = `rgb(${r}, ${g}, ${b})`;
    ctx.lineWidth = w;
    ctx.lineCap = 'round';
    ctx.beginPath();
    ctx.moveTo(x1, y1);
    ctx.lineTo(x2, y2);
    ctx.stroke();
  }

  // ── Handle grip (small dark circle at cursor) ──
  ctx.fillStyle = '#5C3A0E';
  ctx.beginPath();
  ctx.arc(mouseX, mouseY, P.handleWidth * 0.7, 0, Math.PI * 2);
  ctx.fill();

  // ── Star at tip ──
  const twinkle = 0.7 + 0.3 * Math.sin(Date.now() * 0.006);
  const starSize = 14 * twinkle;

  // Star glow
  ctx.save();
  ctx.shadowColor = '#fff';
  ctx.shadowBlur = 25;
  ctx.fillStyle = '#ffd700';
  drawStarShape(tipX, tipY, starSize, 4);
  ctx.fill();
  ctx.restore();

  // Bright white core of the star
  ctx.save();
  ctx.shadowColor = '#fff';
  ctx.shadowBlur = 12;
  ctx.fillStyle = '#fff';
  drawStarShape(tipX, tipY, starSize * 0.55, 4);
  ctx.fill();
  ctx.restore();

  ctx.restore(); // opacity
}

// ── Main loop ──────────────────────────────────────────────────────────────
function loop() {
  update();
  draw();
  requestAnimationFrame(loop);
}
loop();

// ── IPC from main process ──────────────────────────────────────────────────
window.bridge.onSpawnWand(() => {
  active = true;
  dropping = false;
  dropOpacity = 1;
  wandAngle = P.defaultAngle;
  wandAngVel = 0;
  smoothSpeed = 0;
  spawnTime = Date.now();
  lastBlessingTime = 0;
  prevMouseX = mouseX;
  prevMouseY = mouseY;
});

window.bridge.onDropWand(() => {
  if (active && !dropping) dropping = true;
});

</script>
</body>
</html>
