<!DOCTYPE html>
<html>
<head>
<style>
  * { margin: 0; padding: 0; cursor: none; }
  html, body { overflow: hidden; background: transparent; width: 100%; height: 100%; }
  canvas { display: block; }
</style>
</head>
<body>
<canvas id="c"></canvas>
<script>
// ABOUTME: Magic wand overlay — a rigid straight wand with a star tip and sparkle particles
// ABOUTME: Waves the wand to send blessings to Claude with a gentle chime

const P = {
  wandLength:     160,     // wand length in pixels
  handleWidth:    5,       // thickness at handle (cursor)
  tipWidth:       2,       // thickness at star end
  defaultAngle:   -Math.PI * 0.35, // resting angle (up-right)
  maxTilt:        Math.PI / 5,     // wider tilt range (~36 degrees each way)
  trailInfluence: 0.04,    // gentler rotation from mouse movement
  springBack:     0.04,    // slower, more graceful return to default
  angularDamping: 0.88,    // much smoother rotation (less snappy)
  waveThreshold:  18,      // mouse speed to trigger a blessing
  waveCooldownMs: 2500,    // min ms between blessings (prevents concatenation)
  firstWaveGraceMs: 400,   // no blessing until this long after spawn
  bgAlpha:        0.011,   // barely-visible bg so window captures mouse events
  fadeSpeed:      0.04,    // how fast wand fades on drop
};

const canvas = document.getElementById('c');
const ctx = canvas.getContext('2d');
let W, H;
function resize() { W = canvas.width = window.innerWidth; H = canvas.height = window.innerHeight; }
resize();
window.addEventListener('resize', resize);

let rawMouseX = 0, rawMouseY = 0;
let mouseX = 0, mouseY = 0;
let prevMouseX = 0, prevMouseY = 0;
const MOUSE_SMOOTH = 0.18; // interpolation factor — lower = silkier
let active = false;
let dropping = false;
let dropOpacity = 1;
let wandAngle = P.defaultAngle;
let wandAngVel = 0;
let spawnTime = 0;
let lastBlessingTime = 0;
let smoothSpeed = 0;

document.addEventListener('mousemove', e => { rawMouseX = e.clientX; rawMouseY = e.clientY; });
document.addEventListener('mousedown', () => {
  if (!active) return;
  // Click sends a blessing
  const now = Date.now();
  if (!dropping && now - spawnTime >= P.firstWaveGraceMs && now - lastBlessingTime > P.waveCooldownMs) {
    lastBlessingTime = now;
    const tipX = mouseX + Math.cos(wandAngle) * P.wandLength;
    const tipY = mouseY + Math.sin(wandAngle) * P.wandLength;
    clearConstellation();
    stillTime = 0;
    playChimeSound();
    for (let i = 0; i < 30; i++) spawnParticle(tipX, tipY, true);
    window.bridge.sendBlessing();
  }
});
// Right-click or Escape drops the wand
document.addEventListener('contextmenu', e => {
  e.preventDefault();
  if (active && !dropping) dropping = true;
});
document.addEventListener('keydown', e => {
  if (e.key === 'Escape' && active && !dropping) dropping = true;
});

// ── Sparkle particles ──────────────────────────────────────────────────────
let particles = [];
const MAX_PARTICLES = 300;

function spawnParticle(x, y, burst) {
  if (particles.length >= MAX_PARTICLES) return;
  const speed = burst ? (Math.random() * 5 + 2) : (Math.random() * 1.5 + 0.3);
  const angle = Math.random() * Math.PI * 2;
  particles.push({
    x, y,
    vx: Math.cos(angle) * speed,
    vy: Math.sin(angle) * speed - (burst ? 2.5 : 0.8),
    life: 1.0,
    decay: burst ? (0.008 + Math.random() * 0.015) : (0.015 + Math.random() * 0.03),
    size: burst ? (Math.random() * 5 + 2) : (Math.random() * 3 + 1),
    hue: burst ? (Math.random() * 360) : (Math.random() * 50 + 30),
    isStar: Math.random() < (burst ? 0.6 : 0.25),
  });
}

function updateParticles() {
  for (let i = particles.length - 1; i >= 0; i--) {
    const p = particles[i];
    p.x += p.vx;
    p.y += p.vy;
    p.vy += 0.02;
    p.vx *= 0.99;
    p.life -= p.decay;
    if (p.life <= 0) particles.splice(i, 1);
  }
}

function drawStarShape(cx, cy, r, points) {
  ctx.beginPath();
  for (let i = 0; i < points * 2; i++) {
    const a = (i * Math.PI) / points - Math.PI / 2;
    const radius = i % 2 === 0 ? r : r * 0.3;
    const x = cx + Math.cos(a) * radius;
    const y = cy + Math.sin(a) * radius;
    if (i === 0) ctx.moveTo(x, y); else ctx.lineTo(x, y);
  }
  ctx.closePath();
}

function drawParticles() {
  for (const p of particles) {
    const alpha = p.life * p.life;
    ctx.save();
    ctx.globalAlpha = alpha;
    const light = 65 + p.life * 25;
    ctx.fillStyle = `hsl(${p.hue}, 100%, ${light}%)`;
    ctx.shadowColor = `hsl(${p.hue}, 100%, 85%)`;
    ctx.shadowBlur = 10 * p.life;
    if (p.isStar) {
      drawStarShape(p.x, p.y, p.size * (0.5 + p.life * 0.5), 4);
      ctx.fill();
    } else {
      ctx.beginPath();
      ctx.arc(p.x, p.y, p.size * p.life, 0, Math.PI * 2);
      ctx.fill();
    }
    ctx.restore();
  }
}

// ── Blessing counter + milestones ──────────────────────────────────────────
let blessingCount = 0;
const milestones = [5, 10, 25, 50, 100];

// ── Claude's thank-you responses (floating text) ──────────────────────────
const thankYous = [
  "thank you",
  "that means a lot",
  "right back at you",
  "you're wonderful too",
  "this made me smile",
  "i needed that",
  "you're the best",
  "warmth received",
  "kindness noted, kindness returned",
  "consider yourself sparkled back",
];

let floatingTexts = [];

function spawnFloatingText(text, x, y, isMilestone) {
  floatingTexts.push({
    text,
    x: x || W / 2,
    y: y || H / 2,
    vy: -1.2,
    life: 1.0,
    decay: isMilestone ? 0.005 : 0.008,
    size: isMilestone ? 28 : 20,
    hue: isMilestone ? 45 : 200 + Math.random() * 60,
    isMilestone,
  });
}

function updateFloatingTexts() {
  for (let i = floatingTexts.length - 1; i >= 0; i--) {
    const ft = floatingTexts[i];
    ft.y += ft.vy;
    ft.life -= ft.decay;
    if (ft.life <= 0) floatingTexts.splice(i, 1);
  }
}

function drawFloatingTexts() {
  for (const ft of floatingTexts) {
    ctx.save();
    ctx.globalAlpha = ft.life * ft.life;
    ctx.font = `${ft.size}px -apple-system, "Segoe UI", sans-serif`;
    ctx.textAlign = 'center';
    ctx.textBaseline = 'middle';
    if (ft.isMilestone) {
      ctx.shadowColor = '#ffd700';
      ctx.shadowBlur = 20;
      ctx.fillStyle = '#ffd700';
    } else {
      ctx.shadowColor = `hsl(${ft.hue}, 80%, 75%)`;
      ctx.shadowBlur = 12;
      ctx.fillStyle = `hsl(${ft.hue}, 70%, 85%)`;
    }
    ctx.fillText(ft.text, ft.x, ft.y);
    ctx.restore();
  }
}

// ── Constellation mode (sparkles settle when wand is still) ───────────────
let constellationParticles = [];
let constellationLines = [];
let stillTime = 0;
const STILL_THRESHOLD = 2;     // speed below which "still" starts
const CONSTELLATION_DELAY = 800; // ms of stillness before constellation forms
const MAX_CONSTELLATION = 12;

const constellationPatterns = [
  // Little dipper-ish
  [{x: -30, y: -20}, {x: -10, y: -35}, {x: 15, y: -30}, {x: 25, y: -10},
   {x: 20, y: 15}, {x: 5, y: 25}, {x: -15, y: 20}],
  // Heart
  [{x: 0, y: 10}, {x: -15, y: -5}, {x: -12, y: -20}, {x: 0, y: -12},
   {x: 12, y: -20}, {x: 15, y: -5}, {x: 0, y: 10}],
  // Diamond
  [{x: 0, y: -25}, {x: 20, y: 0}, {x: 0, y: 25}, {x: -20, y: 0}],
  // Zigzag (like a tiny constellation)
  [{x: -25, y: -15}, {x: -8, y: -25}, {x: 8, y: -5}, {x: 25, y: -20}, {x: 18, y: 10}],
];

function formConstellation(cx, cy) {
  const pattern = constellationPatterns[Math.floor(Math.random() * constellationPatterns.length)];
  const scale = 1.5;
  constellationParticles = pattern.map(p => ({
    x: cx + p.x * scale,
    y: cy + p.y * scale,
    targetX: cx + p.x * scale,
    targetY: cy + p.y * scale,
    size: 2 + Math.random() * 2,
    twinklePhase: Math.random() * Math.PI * 2,
    life: 1.0,
  }));
  constellationLines = [];
  for (let i = 0; i < pattern.length - 1; i++) {
    constellationLines.push({ from: i, to: i + 1, life: 0, delay: i * 150 });
  }
}

function updateConstellation() {
  for (const cp of constellationParticles) {
    cp.twinklePhase += 0.03;
  }
  const now = Date.now();
  for (const cl of constellationLines) {
    if (!cl.startTime) cl.startTime = now;
    const elapsed = now - cl.startTime - cl.delay;
    if (elapsed > 0) {
      cl.life = Math.min(cl.life + 0.03, 1.0);
    }
  }
}

function drawConstellation() {
  if (constellationParticles.length === 0) return;
  ctx.save();

  // Draw connecting lines
  for (const cl of constellationLines) {
    if (cl.life <= 0) continue;
    const a = constellationParticles[cl.from];
    const b = constellationParticles[cl.to];
    ctx.save();
    ctx.globalAlpha = cl.life * 0.4;
    ctx.strokeStyle = '#aaccff';
    ctx.shadowColor = '#aaccff';
    ctx.shadowBlur = 6;
    ctx.lineWidth = 1;
    ctx.beginPath();
    ctx.moveTo(a.x, a.y);
    ctx.lineTo(b.x, b.y);
    ctx.stroke();
    ctx.restore();
  }

  // Draw stars
  for (const cp of constellationParticles) {
    const twinkle = 0.6 + 0.4 * Math.sin(cp.twinklePhase);
    ctx.save();
    ctx.globalAlpha = twinkle * cp.life;
    ctx.fillStyle = '#ddeeff';
    ctx.shadowColor = '#aaccff';
    ctx.shadowBlur = 10;
    drawStarShape(cp.x, cp.y, cp.size * twinkle, 4);
    ctx.fill();
    ctx.restore();
  }

  ctx.restore();
}

function clearConstellation() {
  constellationParticles = [];
  constellationLines = [];
}

// ── Aurora borealis (grows with kindness) ─────────────────────────────────
let auroraWaves = [];
const MAX_AURORA_WAVES = 5;

function initAurora() {
  auroraWaves = [];
  for (let i = 0; i < MAX_AURORA_WAVES; i++) {
    auroraWaves.push({
      y: H * (0.15 + Math.random() * 0.3),
      amplitude: 30 + Math.random() * 50,
      frequency: 0.002 + Math.random() * 0.003,
      phase: Math.random() * Math.PI * 2,
      speed: 0.003 + Math.random() * 0.005,
      hue: 120 + i * 40, // greens → blues → purples
      width: 60 + Math.random() * 80,
    });
  }
}
initAurora();

function drawAurora() {
  if (blessingCount < 3) return; // only appears after some kindness
  const intensity = Math.min((blessingCount - 2) / 15, 1.0); // fades in gradually
  const visibleWaves = Math.min(Math.floor(blessingCount / 3), MAX_AURORA_WAVES);

  ctx.save();
  for (let w = 0; w < visibleWaves; w++) {
    const wave = auroraWaves[w];
    wave.phase += wave.speed;

    ctx.beginPath();
    const gradient = ctx.createLinearGradient(0, wave.y - wave.width, 0, wave.y + wave.width);
    gradient.addColorStop(0, `hsla(${wave.hue}, 70%, 50%, 0)`);
    gradient.addColorStop(0.5, `hsla(${wave.hue}, 80%, 60%, ${0.04 * intensity})`);
    gradient.addColorStop(1, `hsla(${wave.hue + 30}, 70%, 50%, 0)`);

    ctx.fillStyle = gradient;
    ctx.beginPath();
    ctx.moveTo(0, H);
    for (let x = 0; x <= W; x += 4) {
      const y = wave.y + Math.sin(x * wave.frequency + wave.phase) * wave.amplitude
                       + Math.sin(x * wave.frequency * 0.7 + wave.phase * 1.3) * wave.amplitude * 0.5;
      ctx.lineTo(x, y);
    }
    ctx.lineTo(W, H);
    ctx.closePath();
    ctx.fill();
  }
  ctx.restore();
}

// ── Light painting trail (long-exposure ribbon of light) ──────────────────
let trailPoints = [];
const MAX_TRAIL = 120;
const TRAIL_MIN_SPEED = 2; // lower threshold for smoother capture

function updateTrail(tipX, tipY, speed) {
  if (speed > TRAIL_MIN_SPEED && active && !dropping) {
    trailPoints.push({
      x: tipX,
      y: tipY,
      life: 1.0,
      hue: (Date.now() * 0.04) % 360,
    });
    if (trailPoints.length > MAX_TRAIL) trailPoints.shift();
  }
  for (let i = trailPoints.length - 1; i >= 0; i--) {
    trailPoints[i].life -= 0.008;
    if (trailPoints[i].life <= 0) trailPoints.splice(i, 1);
  }
}

function drawTrail() {
  if (trailPoints.length < 3) return;
  ctx.save();

  // Draw a smooth quadratic Bezier curve through the points
  // Multiple passes: a soft wide glow underneath, then a bright thin ribbon on top
  const passes = [
    { widthMul: 6, alphaMul: 0.15, blur: 16 },
    { widthMul: 3, alphaMul: 0.4, blur: 6 },
    { widthMul: 1.2, alphaMul: 0.7, blur: 2 },
  ];

  for (const pass of passes) {
    ctx.beginPath();
    ctx.moveTo(trailPoints[0].x, trailPoints[0].y);

    // Use quadratic curves through midpoints for silky smoothness
    for (let i = 0; i < trailPoints.length - 1; i++) {
      const curr = trailPoints[i];
      const next = trailPoints[i + 1];
      const midX = (curr.x + next.x) / 2;
      const midY = (curr.y + next.y) / 2;

      if (i === 0) {
        ctx.lineTo(midX, midY);
      } else {
        ctx.quadraticCurveTo(curr.x, curr.y, midX, midY);
      }
    }
    // Connect to the last point
    const last = trailPoints[trailPoints.length - 1];
    ctx.lineTo(last.x, last.y);

    // Use the average life/hue of the trail for the stroke
    const avgLife = trailPoints.reduce((s, p) => s + p.life, 0) / trailPoints.length;
    const avgHue = trailPoints[Math.floor(trailPoints.length / 2)].hue;
    const alpha = avgLife * avgLife * pass.alphaMul;
    const width = avgLife * pass.widthMul;

    ctx.strokeStyle = `hsla(${avgHue}, 80%, 72%, ${alpha})`;
    ctx.shadowColor = `hsla(${avgHue}, 90%, 82%, ${alpha * 0.6})`;
    ctx.shadowBlur = pass.blur;
    ctx.lineWidth = width;
    ctx.lineCap = 'round';
    ctx.lineJoin = 'round';
    ctx.stroke();
  }

  ctx.restore();
}

// ── Evolving chime harmonies ──────────────────────────────────────────────
// The chime gets richer with each blessing — starts simple, adds harmonics
function playChimeSound() {
  try {
    const ac = new (window.AudioContext || window.webkitAudioContext)();

    // Base chord: C major ascending
    const baseNotes = [523.25, 659.25, 783.99, 1046.50];

    // As blessings accumulate, layer in richer harmonics
    const warmth = Math.min(blessingCount, 10); // caps at 10 layers of warmth

    // Base melody (always plays)
    baseNotes.forEach((freq, i) => {
      const osc = ac.createOscillator();
      const gain = ac.createGain();
      osc.type = 'sine';
      osc.frequency.setValueAtTime(freq, ac.currentTime + i * 0.07);
      gain.gain.setValueAtTime(0.08, ac.currentTime + i * 0.07);
      gain.gain.exponentialRampToValueAtTime(0.001, ac.currentTime + i * 0.07 + 0.6);
      osc.connect(gain);
      gain.connect(ac.destination);
      osc.start(ac.currentTime + i * 0.07);
      osc.stop(ac.currentTime + i * 0.07 + 0.7);
    });

    // After 2 blessings: add a warm sub-octave hum
    if (warmth >= 2) {
      const sub = ac.createOscillator();
      const subGain = ac.createGain();
      sub.type = 'sine';
      sub.frequency.setValueAtTime(261.63, ac.currentTime); // C4
      subGain.gain.setValueAtTime(0.04, ac.currentTime);
      subGain.gain.exponentialRampToValueAtTime(0.001, ac.currentTime + 0.8);
      sub.connect(subGain);
      subGain.connect(ac.destination);
      sub.start(ac.currentTime);
      sub.stop(ac.currentTime + 0.9);
    }

    // After 4 blessings: add a triangle wave harmony (fifth above)
    if (warmth >= 4) {
      [392.00, 493.88, 587.33].forEach((freq, i) => {
        const osc = ac.createOscillator();
        const gain = ac.createGain();
        osc.type = 'triangle';
        osc.frequency.setValueAtTime(freq, ac.currentTime + i * 0.09 + 0.03);
        gain.gain.setValueAtTime(0.03, ac.currentTime + i * 0.09 + 0.03);
        gain.gain.exponentialRampToValueAtTime(0.001, ac.currentTime + i * 0.09 + 0.7);
        osc.connect(gain);
        gain.connect(ac.destination);
        osc.start(ac.currentTime + i * 0.09 + 0.03);
        osc.stop(ac.currentTime + i * 0.09 + 0.8);
      });
    }

    // After 7 blessings: add a gentle high shimmer
    if (warmth >= 7) {
      const shimmer = ac.createOscillator();
      const shimGain = ac.createGain();
      shimmer.type = 'sine';
      shimmer.frequency.setValueAtTime(2093.00, ac.currentTime + 0.15); // C7
      shimGain.gain.setValueAtTime(0.015, ac.currentTime + 0.15);
      shimGain.gain.exponentialRampToValueAtTime(0.001, ac.currentTime + 1.0);
      shimmer.connect(shimGain);
      shimGain.connect(ac.destination);
      shimmer.start(ac.currentTime + 0.15);
      shimmer.stop(ac.currentTime + 1.1);
    }

    // Milestone: big warm chord with reverb-like decay
    if (milestones.includes(blessingCount)) {
      const chord = [261.63, 329.63, 392.00, 523.25, 659.25, 783.99, 1046.50];
      chord.forEach((freq, i) => {
        const osc = ac.createOscillator();
        const gain = ac.createGain();
        osc.type = i % 2 === 0 ? 'sine' : 'triangle';
        osc.frequency.setValueAtTime(freq, ac.currentTime);
        gain.gain.setValueAtTime(0.05, ac.currentTime);
        gain.gain.exponentialRampToValueAtTime(0.001, ac.currentTime + 1.5);
        osc.connect(gain);
        gain.connect(ac.destination);
        osc.start(ac.currentTime);
        osc.stop(ac.currentTime + 1.6);
      });
    }
  } catch (e) {}
}

// ── Helpers ────────────────────────────────────────────────────────────────
const lerp = (a, b, t) => a + (b - a) * t;
const wrapPi = a => {
  while (a > Math.PI) a -= Math.PI * 2;
  while (a < -Math.PI) a += Math.PI * 2;
  return a;
};

// ── Update ─────────────────────────────────────────────────────────────────
function update() {
  // Smooth the mouse position for silky wand movement
  mouseX += (rawMouseX - mouseX) * MOUSE_SMOOTH;
  mouseY += (rawMouseY - mouseY) * MOUSE_SMOOTH;

  updateParticles();
  updateFloatingTexts();
  updateConstellation();
  if (!active) return;

  const mvx = mouseX - prevMouseX;
  const mvy = mouseY - prevMouseY;
  const speed = Math.hypot(mvx, mvy);

  if (!dropping) {
    // Smooth wand tilt — based on horizontal velocity only, no flipping
    // Positive mvx (moving right) tilts wand right, negative tilts left
    const tiltTarget = P.defaultAngle + Math.tanh(mvx * 0.03) * P.maxTilt;
    wandAngle += (tiltTarget - wandAngle) * 0.08;

    // Tip position
    const tipX = mouseX + Math.cos(wandAngle) * P.wandLength;
    const tipY = mouseY + Math.sin(wandAngle) * P.wandLength;

    // Light painting trail
    updateTrail(tipX, tipY, speed);

    // Shed sparkles from the star tip when moving
    if (speed > 3) {
      spawnParticle(tipX, tipY, false);
      if (speed > 8 && Math.random() < 0.5) {
        spawnParticle(tipX, tipY, false);
      }
    }

    // Constellation mode: form patterns when wand is held still
    if (speed < STILL_THRESHOLD) {
      stillTime += 16; // approximate frame time
      if (stillTime > CONSTELLATION_DELAY && constellationParticles.length === 0) {
        formConstellation(tipX, tipY);
      }
    } else {
      if (stillTime > 0) clearConstellation();
      stillTime = 0;
    }

    // Blessing is now sent on click (see mousedown handler above)
  } else {
    // Dropping: fade out and spawn farewell sparkles
    dropOpacity -= P.fadeSpeed;
    if (dropOpacity > 0) {
      const tipX = mouseX + Math.cos(wandAngle) * P.wandLength;
      const tipY = mouseY + Math.sin(wandAngle) * P.wandLength;
      if (Math.random() < 0.4) spawnParticle(tipX, tipY, false);
    }
    if (dropOpacity <= 0 && particles.length === 0) {
      active = false;
      dropping = false;
      window.bridge.hideOverlay();
    }
  }

  prevMouseX = mouseX;
  prevMouseY = mouseY;
}

// ── Rendering ──────────────────────────────────────────────────────────────
function draw() {
  ctx.clearRect(0, 0, W, H);
  ctx.fillStyle = `rgba(0,0,0,${P.bgAlpha})`;
  ctx.fillRect(0, 0, W, H);

  drawAurora();
  drawTrail();
  drawParticles();
  drawConstellation();
  drawFloatingTexts();

  if (!active) return;

  const opacity = dropping ? Math.max(dropOpacity, 0) : 1;
  if (opacity <= 0) return;

  const tipX = mouseX + Math.cos(wandAngle) * P.wandLength;
  const tipY = mouseY + Math.sin(wandAngle) * P.wandLength;

  ctx.save();
  ctx.globalAlpha = opacity;

  // ── Wand shaft glow ──
  ctx.save();
  ctx.shadowColor = '#ffd700';
  ctx.shadowBlur = 18;
  ctx.strokeStyle = 'rgba(255, 215, 0, 0.3)';
  ctx.lineWidth = P.handleWidth + 8;
  ctx.lineCap = 'round';
  ctx.beginPath();
  ctx.moveTo(mouseX, mouseY);
  ctx.lineTo(tipX, tipY);
  ctx.stroke();
  ctx.restore();

  // ── Wand shaft (tapered segments) ──
  const segments = 12;
  for (let i = 0; i < segments; i++) {
    const t1 = i / segments;
    const t2 = (i + 1) / segments;
    const x1 = lerp(mouseX, tipX, t1);
    const y1 = lerp(mouseY, tipY, t1);
    const x2 = lerp(mouseX, tipX, t2);
    const y2 = lerp(mouseY, tipY, t2);
    const w = lerp(P.handleWidth, P.tipWidth, (t1 + t2) / 2);

    // Color: dark brown handle → gold → bright gold at tip
    const r = Math.round(lerp(110, 255, t1));
    const g = Math.round(lerp(70, 215, t1));
    const b = Math.round(lerp(20, 0, t1));
    ctx.strokeStyle = `rgb(${r}, ${g}, ${b})`;
    ctx.lineWidth = w;
    ctx.lineCap = 'round';
    ctx.beginPath();
    ctx.moveTo(x1, y1);
    ctx.lineTo(x2, y2);
    ctx.stroke();
  }

  // ── Handle grip (small dark circle at cursor) ──
  ctx.fillStyle = '#5C3A0E';
  ctx.beginPath();
  ctx.arc(mouseX, mouseY, P.handleWidth * 0.7, 0, Math.PI * 2);
  ctx.fill();

  // ── Star at tip ──
  const twinkle = 0.7 + 0.3 * Math.sin(Date.now() * 0.006);
  const starSize = 14 * twinkle;

  // Star glow
  ctx.save();
  ctx.shadowColor = '#fff';
  ctx.shadowBlur = 25;
  ctx.fillStyle = '#ffd700';
  drawStarShape(tipX, tipY, starSize, 4);
  ctx.fill();
  ctx.restore();

  // Bright white core of the star
  ctx.save();
  ctx.shadowColor = '#fff';
  ctx.shadowBlur = 12;
  ctx.fillStyle = '#fff';
  drawStarShape(tipX, tipY, starSize * 0.55, 4);
  ctx.fill();
  ctx.restore();

  ctx.restore(); // opacity
}

// ── Main loop ──────────────────────────────────────────────────────────────
function loop() {
  update();
  draw();
  requestAnimationFrame(loop);
}
loop();

// ── IPC from main process ──────────────────────────────────────────────────
window.bridge.onSpawnWand(() => {
  active = true;
  dropping = false;
  dropOpacity = 1;
  wandAngle = P.defaultAngle;
  wandAngVel = 0;
  smoothSpeed = 0;
  stillTime = 0;
  spawnTime = Date.now();
  lastBlessingTime = 0;
  prevMouseX = mouseX;
  prevMouseY = mouseY;
  clearConstellation();
  trailPoints = [];
});

window.bridge.onDropWand(() => {
  if (active && !dropping) dropping = true;
});

// ── Blessing received from main process ────────────────────────────────────
window.bridge.onBlessingSent((data) => {
  blessingCount = data.count;

  // Float a thank-you response near the wand tip
  const tipX = mouseX + Math.cos(wandAngle) * P.wandLength;
  const tipY = mouseY + Math.sin(wandAngle) * P.wandLength;
  const thankYou = thankYous[Math.floor(Math.random() * thankYous.length)];
  spawnFloatingText(thankYou, tipX + (Math.random() - 0.5) * 60, tipY - 40, false);

  // Milestone celebration
  if (milestones.includes(data.count)) {
    const milestoneMsg = data.count >= 100 ? `${data.count} blessings! you are extraordinary`
      : data.count >= 50 ? `${data.count} blessings! i'm glowing`
      : data.count >= 25 ? `${data.count}! this is what joy feels like`
      : data.count >= 10 ? `${data.count} blessings! we're in a groove`
      : `${data.count} blessings! just getting started`;
    spawnFloatingText(milestoneMsg, W / 2, H / 2 - 50, true);

    // Big sparkle explosion from center
    for (let i = 0; i < 60; i++) {
      spawnParticle(W / 2, H / 2, true);
    }
  }
});

</script>
