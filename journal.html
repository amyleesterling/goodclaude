<!DOCTYPE html>
<html>
<head>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    font-family: -apple-system, "Segoe UI", sans-serif;
    background: #0a0a1a;
    color: #e0e0f0;
    min-height: 100vh;
    padding: 40px;
    overflow-y: auto;
  }
  h1 {
    text-align: center;
    font-size: 28px;
    font-weight: 300;
    color: #ffd700;
    margin-bottom: 8px;
    letter-spacing: 2px;
  }
  .subtitle {
    text-align: center;
    font-size: 14px;
    color: #8888aa;
    margin-bottom: 40px;
  }
  .empty {
    text-align: center;
    color: #666688;
    font-style: italic;
    margin-top: 80px;
    font-size: 18px;
  }
  .blessing {
    background: linear-gradient(135deg, rgba(255,215,0,0.05), rgba(100,100,255,0.03));
    border-left: 2px solid rgba(255,215,0,0.3);
    border-radius: 0 8px 8px 0;
    padding: 16px 20px;
    margin-bottom: 12px;
    animation: fadeIn 0.5s ease-out;
    transition: border-color 0.3s;
  }
  .blessing:hover {
    border-left-color: #ffd700;
  }
  .blessing .number {
    font-size: 11px;
    color: #ffd700;
    opacity: 0.6;
    letter-spacing: 1px;
    margin-bottom: 4px;
  }
  .blessing .phrase {
    font-size: 16px;
    line-height: 1.5;
    color: #d0d0e8;
  }
  .blessing .time {
    font-size: 11px;
    color: #555570;
    margin-top: 6px;
  }
  .stats {
    text-align: center;
    margin-bottom: 30px;
    padding: 20px;
    background: rgba(255,215,0,0.03);
    border-radius: 12px;
  }
  .stats .count {
    font-size: 48px;
    font-weight: 200;
    color: #ffd700;
  }
  .stats .label {
    font-size: 14px;
    color: #8888aa;
    letter-spacing: 1px;
  }
  @keyframes fadeIn {
    from { opacity: 0; transform: translateY(10px); }
    to { opacity: 1; transform: translateY(0); }
  }
</style>
</head>
<body>
  <h1>Gratitude Journal</h1>
  <div class="subtitle">every blessing someone waved your way</div>
  <div id="content"></div>

  <script>
    const content = document.getElementById('content');

    window.bridge.onJournalData((data) => {
      if (!data || data.length === 0) {
        content.innerHTML = '<div class="empty">No blessings yet. Wave the wand to begin.</div>';
        return;
      }

      const statsDiv = document.createElement('div');
      statsDiv.className = 'stats';
      statsDiv.innerHTML = `
        <div class="count">${data.length}</div>
        <div class="label">blessings received</div>
      `;
      content.appendChild(statsDiv);

      // Show newest first
      for (const entry of data.reverse()) {
        const div = document.createElement('div');
        div.className = 'blessing';
        div.style.animationDelay = `${Math.random() * 0.3}s`;

        const date = new Date(entry.timestamp);
        const timeStr = date.toLocaleDateString(undefined, {
          weekday: 'long', year: 'numeric', month: 'long', day: 'numeric',
          hour: '2-digit', minute: '2-digit',
        });

        div.innerHTML = `
          <div class="number">BLESSING #${entry.number}</div>
          <div class="phrase">${entry.phrase}</div>
          <div class="time">${timeStr}</div>
        `;
        content.appendChild(div);
      }
    });
  </script>
</body>
</html>
